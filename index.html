<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Frontend Mentor | Calculator app</title>
  </head>
  <body>
    <main>
      <div class="box-1">
        <span>calc</span>
        <div>
          <span>THEME</span>
          <span>1 2 3</span>
        </div>
      </div>
      <div class="box-2"><span id="display"></span></div>
      <div class="box-3">
        <div class="btn-box">
          <input class="number-btn" type="button" value="7" />
          <input class="number-btn" type="button" value="8" />
          <input class="number-btn" type="button" value="9" />
          <input id="delete-btn" type="button" value="DEL" />
          <input class="number-btn" type="button" value="4" />
          <input class="number-btn" type="button" value="5" />
          <input class="number-btn" type="button" value="6" />
          <input class="operator-btn" type="button" value="+" />
          <input class="number-btn" type="button" value="1" />
          <input class="number-btn" type="button" value="2" />
          <input class="number-btn" type="button" value="3" />
          <input class="operator-btn" type="button" value="-" />
          <input class="" type="button" value="." />
          <input class="number-btn" type="button" value="0" />
          <input class="operator-btn" type="button" value="/" />
          <input class="operator-btn" type="button" value="*" />
        </div>
        <div class="btn-box-2">
          <input id="reset-btn" type="reset" value="RESET" />
          <input id="equal-btn" type="button" value="=" />
        </div>
      </div>
    </main>
    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Your Name Here</a>.
      </div>
    </footer>
    <script src="js/index.js"></script>
  </body>
</html>
